name: Daily commit
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Make empty commit
        run: |
          git config user.email "nandakishor.sajeev@gmail.com"
          git config user.name "Nanda777-max"
          git commit --allow-empty -m "daily update"
          git push
